<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NexAuto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm border-0 rounded-4" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Admin Portal</h3>
                <p class="text-muted">Enter credentials to access student records.</p>
            </div>

            <!-- Error Message Box -->
            {% if error %}
                <div class="alert alert-danger text-center p-2 mb-4" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" class="form-control py-2" name="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control py-2" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Secure Login</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/" class="text-decoration-none text-muted small">← Back to Main Website</a>
            </div>
        </div>
    </div>

</body>
</html>
